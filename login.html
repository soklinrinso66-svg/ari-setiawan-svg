<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Akun - videobelajar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-logo">video<span>belajar</span></div>
        
        <div class="auth-card">
            <h2>Pendaftaran Akun</h2>
            <p class="auth-subtitle">Yuk, daftarkan akunmu sekarang juga!</p>
            
            <form>
                <div class="form-group">
                    <label>Nama Lengkap <span>*</span></label>
                    <input type="text" placeholder="Nama Lengkap Anda" required>
                </div>

                <div class="form-group">
                    <label>E-Mail <span>*</span></label>
                    <input type="email" placeholder="contoh@email.com" required>
                </div>

                <div class="form-group">
                    <label>No. HP <span>*</span></label>
                    <div style="display: flex; gap: 8px;">
                        <select style="width: 80px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 6px; background-color: #ffffff; font-size: 14px; outline: none;">
                            <option>🇮🇩 +62</option>
                        </select>
                        <input type="tel" placeholder="812345678" required style="flex: 1;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Kata Sandi <span>*</span></label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Kata Sandi <span>*</span></label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-actions">
                    <a href="#" class="forgot-link">Lupa password?</a>
                </div>
                
                <button type="submit" class="btn-primary">Daftar</button>
                <a href="login.html" class="btn-secondary" style="text-decoration: none;">Masuk</a>
                
                <div class="auth-divider">atau</div>
                
                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    Daftar dengan Google
                </button>
            </form>
        </div>
    </div>

</body>
</html>
