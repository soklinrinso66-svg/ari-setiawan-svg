<html lang="en">
<head>

</head>
<body class="auth-body">
    <div class="auth-container">
<div class="auth-logo">video<span>belajar</span></div>
    
<div class="auth-card">

    <form>
        <div class="form-group">
            <label>E-mail  <span>*</span></label>
            <input type="email" placeholder="contoh@email.com
            " required>
        </div>
<div class="form-gruop">
    <label>Kata Sandi <span>*</span></label>
    <input type="password" placeholder="........" required>
</div>
<div class="form-actions">
    <a href="#" class="forgot-link">Lupa password</a>
</div>
<button type="submit" class="btn-auth-primary">Masuk</button>
<a href="#" class="btn-auth-secondary">Daftar</a>
<div class="auth-divider">atau</div>
<button type="button" class="btn-auth-google">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">"
    Masuk dengan google
</button>
    </form>
    </div>
</div>

</html>
